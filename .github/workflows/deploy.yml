name: Build and Deploy to Oracle Cloud VM

on:
  push:
    branches: [ "main" ]

env:
  BACKEND_IMAGE: bulletmarket-backend
  FRONTEND_IMAGE: bulletmarket-frontend
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  # 1단계: 빌드 작업 (Java 빌드 후 Docker Hub 푸시)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔹 그래들 빌드를 위한 Java 21 런타임 세팅
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 🔹 그래들 래퍼 실행 권한 부여 및 스프링 부트 jar 빌드
      - name: Grant execute permission for gradlew
        run: chmod +x ./backend/gradlew

      - name: Build Backend Jar with Gradle
        run: |
          cd backend
          ./gradlew clean bootJar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest

  # 2단계: 배포 작업 (오라클 리눅스 VM 재가동)
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 원래 프로젝트 파일 전송
      - name: Transfer config files to Oracle VM
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.SERVER_USER }}/bulletmarket"
      
      # 2. 불렛마켓 Nginx 설정을 메인 프록시 폴더로 직접 전송
      - name: Transfer Nginx Config to Global Proxy
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "nginx/bulletmarket.conf"
          target: "/home/${{ secrets.SERVER_USER }}/global-proxy"

      # 3. 서버 접속 후 컨테이너 가동 및 대장 프록시 동기화
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.SERVER_USER }}/bulletmarket
            
            # 1) 환경 변수 파일(.env) 빌드
            echo "${{ secrets.DOT_ENV }}" > .env
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env
            echo "BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}" >> .env
            echo "FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}" >> .env
            
            # Docker Hub 자격 증명 로그인
            echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # 2) 오라클 리눅스 서버 내 컨테이너 완전 정비 및 다운
            docker compose down --remove-orphans
            
            # 3) 찌꺼기 이미지 및 좀비 볼륨 소거 처리
            docker container prune -f
            docker image prune -a -f
            
            # 4) 방금 빌드된 최신 래핑 이미지 풀링 및 컨테이너 무중단 롤링 가동
            docker compose pull
            docker compose up -d
            
            # 5) 메인 Nginx 가상 네트워크망 및 설정 파일 최종 동기화
            echo "Syncing Global Proxy Nginx..."
            cd /home/${{ secrets.SERVER_USER }}/global-proxy
            docker compose down
            docker compose up -d