# 🔹 프록시 기본 헤더 설정
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# 1️⃣ HTTP(80) -> HTTPS(443) 자동 리다이렉트
server {
    listen 80;
    server_name bulletmarket.duckdns.org;
    return 301 https://$host$request_uri;
}

# 2️⃣ 정식 HTTPS 라우팅
server {
    listen 443 ssl;
    server_name bulletmarket.duckdns.org;

    # Let's Encrypt 인증서 경로 (공통 사용)
    ssl_certificate /etc/letsencrypt/live/drawlink.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drawlink.duckdns.org/privkey.pem;

    # 프론트엔드 컨테이너 라우팅
    location / {
        proxy_pass http://bulletmarket-frontend:80;
    }

    # 백엔드 스프링부트 컨테이너 라우팅 (정석 매핑)
    location /api/ {
        proxy_pass http://bulletmarket-backend:8080;
    }
}