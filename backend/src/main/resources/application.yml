server:
  port: 8080
  error:
    include-stacktrace: always
    include-message: always

spring:
  # 1️⃣ 환경 변수 파일(.env) 파싱 주입 설정 (절대 비밀번호 하드코딩 금지)
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  application:
    name: bulletmarket-backend

  # 2️⃣ 하드코딩된 Fallback(기본값)을 전부 제거하고 오직 환경 변수로만 매핑
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?preparedStatementCacheQueriesPerConnection=0}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 10000
      max-lifetime: 1800000
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false